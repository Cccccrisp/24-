<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>24节气时令数据可视化</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&display=swap');
        body { font-family: 'Space Grotesk', system-ui, -apple-system, sans-serif; background-color: #0a0a0a; overflow: hidden; }
        .text-glow { text-shadow: 0 0 15px rgba(255,255,255,0.6); }
        #detail-panel::-webkit-scrollbar { width: 4px; }
        #detail-panel::-webkit-scrollbar-track { background: transparent; }
        #detail-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 999px; }
        @keyframes breathe {
            0%,100% { box-shadow: 0 0 6px var(--breathe-color, rgba(255,255,255,0.4)); }
            50% { box-shadow: 0 0 18px var(--breathe-color, rgba(255,255,255,0.9)), 0 0 32px var(--breathe-color, rgba(255,255,255,0.3)); }
        }
        @keyframes burst-particle {
            0% { transform: translate(0,0) scale(1); opacity: 1; }
            100% { transform: translate(var(--bx), var(--by)) scale(0); opacity: 0; }
        }
        @keyframes popcard-in {
            0% { opacity: 0; transform: translateY(8px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        .streak-lit { animation: breathe 2.4s ease-in-out infinite; }
        .checkin-burst { position: fixed; pointer-events: none; z-index: 999; width: 6px; height: 6px; border-radius: 50%; animation: burst-particle 0.8s ease-out forwards; }
        .popcard-enter { animation: popcard-in 0.25s ease-out forwards; }
        @keyframes muyu-vibrate { 0% { transform: scale(1) rotate(0deg); } 26% { transform: scale(0.92) translate(-2px, 1px) rotate(-2deg); } 46% { transform: scale(1.07) translate(3px, -3px) rotate(2.5deg); } 66% { transform: scale(0.95) translate(-1px, 2px) rotate(-1.5deg); } 85% { transform: scale(1.03) translate(1px, -1px) rotate(1deg); } 100% { transform: scale(1) rotate(0deg); } }
        @keyframes float-up { 0% { transform: translateY(0) scale(0.8); opacity: 0; } 20% { opacity: 1; } 100% { transform: translateY(-70px) scale(1.1); opacity: 0; } }
        @keyframes merit-breathe { 0%,100% { opacity: 0.7; } 50% { opacity: 1; } }
        .animate-vibrate { animation: muyu-vibrate 0.36s ease-out; }
        .animate-float { animation: float-up 0.8s ease-out forwards; }

        @keyframes confetti-explode-v2 { 0% { transform: translate(0, 0) scale(1); opacity: 1; } 100% { transform: translate(var(--tw-translate-x), var(--tw-translate-y)) rotate(var(--tw-rotate)) scale(0); opacity: 0; } }
        @keyframes wave-expand { 0% { transform: scale(0.1); opacity: 0.9; border-color: #FBBF24; border-width: 3px; } 100% { transform: scale(2.2); opacity: 0; border-color: rgba(251,191,36,0); border-width: 0px; } }

        .animate-confetti-v2 { animation: confetti-explode-v2 0.8s ease-out forwards; }
        .animate-wave { animation: wave-expand 0.45s ease-out forwards; }
    </style>
</head>
<body class="relative w-screen h-screen text-white select-none">

    <!-- ===== 全屏弥散光背景底座 ===== -->
    <div id="ambient-backdrop" class="fixed inset-0 w-screen h-screen -z-50 bg-[#070708] transition-all duration-1000 ease-in-out pointer-events-none">
        <div id="ambient-glow" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[120vw] h-[120vh] rounded-full filter blur-[140px] opacity-20 transition-all duration-1000 ease-in-out"></div>
    </div>
    <canvas id="ambient-canvas" class="absolute inset-0 pointer-events-none z-0"></canvas>
    <div class="absolute inset-0 bg-black/30 pointer-events-none z-5"></div>

    <!-- ===== 响应式主舞台 ===== -->
    <div class="relative w-full h-full flex flex-col md:flex-row items-center justify-between px-4 pb-16 pt-4 md:px-16 md:pb-0 md:pt-0 overflow-hidden z-10">

        <!-- ===== 视窗 A：星盘 ===== -->
        <div id="viewport-wheel" class="relative w-full md:w-1/2 h-full flex items-center justify-center scale-[0.65] sm:scale-[0.75] md:scale-100 origin-center">
            <div id="wheel-container" class="relative w-[600px] h-[600px] rounded-full flex items-center justify-center"></div>

            <!-- 中央核心枢纽 -->
            <div id="center-hub" class="absolute w-[290px] h-[290px] rounded-full bg-white/5 border border-white/10 backdrop-blur-2xl flex flex-col items-center justify-center text-center p-6 pointer-events-none shadow-2xl drop-shadow-[0_2px_8px_rgba(0,0,0,0.8)]">
                <span class="text-[10px] tracking-[0.4em] text-white/40 uppercase font-mono">Solar Axis</span>
                <h1 id="center-name" class="text-6xl font-bold my-3 tracking-widest transition-all duration-300">---</h1>
                <div id="weather-badge" class="text-[11px] font-mono text-white/50 tracking-wide mb-2 transition-all duration-500">🌐 --</div>
                <div class="w-12 h-[1px] bg-white/20 my-1"></div>
                <div class="text-xs font-mono text-white/50 tracking-wide">黄经面: <span id="center-angle" class="text-white font-bold">0</span>°</div>
                <div class="text-xs font-mono text-white/50 tracking-wide mt-1">日照率: <span id="center-daylight" class="text-white font-bold">0</span></div>
            </div>
        </div>

        <!-- ===== 视窗 B：撕历 ===== -->
        <div id="detail-panel" class="hidden md:block relative w-full md:w-[430px] h-[calc(100vh-140px)] md:h-[85vh] bg-black/20 border border-white/10 backdrop-blur-3xl rounded-2xl p-6 flex flex-col justify-between overflow-y-auto z-20 shadow-2xl drop-shadow-[0_2px_8px_rgba(0,0,0,0.8)]">

            <div>
                <!-- 赛博撕历：几何日期块 -->
                <div class="flex gap-4 mb-4">
                    <div class="relative w-[88px] h-[104px] bg-gradient-to-br from-white/10 to-white/[0.02] border border-white/15 rounded-xl flex flex-col items-center justify-center overflow-hidden shrink-0 shadow-lg">
                        <div class="absolute top-0 left-0 right-0 h-[20px] bg-white/10 flex items-center justify-center">
                            <span id="cal-month" class="text-[9px] font-mono text-white/50 tracking-[0.3em] uppercase font-bold">MAY</span>
                        </div>
                        <div id="cal-day" class="text-[40px] font-bold mt-2 font-mono tracking-tighter leading-none text-white">18</div>
                        <div id="cal-week" class="text-[9px] text-white/30 font-mono tracking-wider mt-0.5 uppercase">MON</div>
                        <div class="absolute -bottom-1 -right-1 w-4 h-4 bg-white/10 rounded-full blur-sm"></div>
                    </div>
                    <!-- 天气 + 季节图腾 -->
                    <div class="flex-1 flex flex-col justify-center space-y-1.5 min-w-0">
                        <div id="weather-row" class="flex items-center gap-2 text-[11px] font-mono text-white/45">
                            <span class="text-[15px]">🌐</span>
                            <span id="weather-text" class="truncate">定位中...</span>
                        </div>
                        <div id="totem-row" class="flex items-center gap-2 text-[10px] font-mono text-white/40">
                            <span id="totem-icon" class="text-sm">--</span>
                            <span id="totem-text" class="tracking-wider">--</span>
                        </div>
                        <div class="flex items-center gap-2 mt-0.5">
                            <span class="text-[9px] text-white/25 font-mono tracking-wider shrink-0">时令进程</span>
                            <div class="flex-1 h-[2.5px] bg-white/8 rounded-full overflow-hidden">
                                <div id="term-progress-bar" class="h-full bg-white/60 rounded-full transition-all duration-700" style="width:0%"></div>
                            </div>
                            <span id="term-progress-text" class="text-[9px] text-white/30 font-mono shrink-0">--</span>
                        </div>
                    </div>
                </div>

                <!-- 当月完整月历 7×5 网格 -->
                <div class="mb-4 bg-white/[0.02] border border-white/5 rounded-xl p-3">
                    <div class="flex justify-between items-center mb-2">
                        <span id="month-label" class="text-[9px] font-mono text-white/30 uppercase tracking-widest">May 2026</span>
                        <span class="text-[8px] font-mono text-white/20 tracking-wider">SUN MON TUE WED THU FRI SAT</span>
                    </div>
                    <div id="monthly-calendar" class="grid grid-cols-7 gap-[3px]"></div>
                </div>

                <!-- 今日宜忌（去重） -->
                <div class="flex gap-3 mb-4">
                    <div class="flex-1 bg-white/[0.03] border border-white/10 rounded-xl p-3 space-y-1.5">
                        <div class="flex items-center gap-1.5">
                            <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 shrink-0 shadow-[0_0_6px_rgba(52,211,153,0.6)]"></span>
                            <span id="daily-yee-1" class="text-[11px] text-white/85 font-sans truncate block">--</span>
                        </div>
                        <div class="flex items-center gap-1.5">
                            <span class="w-1.5 h-1.5 rounded-full bg-emerald-400/60 shrink-0"></span>
                            <span id="daily-yee-2" class="text-[11px] text-white/85 font-sans truncate block">--</span>
                        </div>
                    </div>
                    <div class="flex-1 bg-white/[0.03] border border-white/10 rounded-xl p-3 space-y-1.5">
                        <div class="flex items-center gap-1.5">
                            <span class="w-1.5 h-1.5 rounded-full bg-rose-400 shrink-0 shadow-[0_0_6px_rgba(251,113,133,0.6)]"></span>
                            <span id="daily-jee-1" class="text-[11px] text-white/70 font-sans truncate block">--</span>
                        </div>
                        <div class="flex items-center gap-1.5">
                            <span class="w-1.5 h-1.5 rounded-full bg-rose-400/60 shrink-0"></span>
                            <span id="daily-jee-2" class="text-[11px] text-white/70 font-sans truncate block">--</span>
                        </div>
                    </div>
                </div>
                <div class="flex justify-between text-[10px] font-mono text-white/35 mb-4 px-0.5 tracking-wide">
                    <span>吉神方位 <span id="lucky-dir" class="text-white/55">--</span></span>
                    <span>时令吉时 <span id="lucky-hour" class="text-white/55">--</span></span>
                </div>

                <!-- 时令特征描述 -->
                <div class="space-y-1.5 mb-2">
                    <span class="text-[10px] tracking-widest text-white/30 uppercase font-mono block">Phenology / 时令特征</span>
                    <p id="long-desc" class="text-sm leading-relaxed text-white/80 font-sans tracking-wide text-justify min-h-[80px]"></p>
                </div>
            </div>

            <!-- ===== 签到 / 木鱼双态区 ===== -->
            <div id="checkin-muyu-zone" class="border-t border-white/10 pt-4 mt-3">
                <button id="daily-checkin-btn" class="w-full bg-white text-black hover:bg-white/90 active:scale-[0.99] transition-all py-2.5 rounded-xl font-bold text-xs uppercase tracking-widest cursor-pointer shadow-md">
                    签到今日时令 / ALIGN WITH TIME
                </button>
                <div id="streak-block" class="mt-4 bg-white-[0.01] border border-white/5 p-3 rounded-xl">
                    <div class="flex justify-between items-center mb-2.5">
                        <span class="text-[10px] tracking-widest text-white/30 uppercase font-mono">Streak Matrix / 7日行度</span>
                        <span id="streak-count" class="text-[10px] font-mono text-white/50 bg-white/5 px-2 py-0.5 rounded-full">连签 0 天</span>
                    </div>
                    <div id="streak-matrix" class="grid grid-cols-7 gap-2"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 节气浮窗卡片（提至 body 级，避免 transform 干扰 fixed 定位） -->
    <div id="term-popcard" class="hidden fixed z-[200] w-[260px] bg-black/70 border border-white/15 backdrop-blur-2xl rounded-xl p-4 shadow-2xl pointer-events-none">
        <div class="flex items-center gap-2 mb-2">
            <div id="popcard-dot" class="w-2.5 h-2.5 rounded-full shrink-0"></div>
            <h3 id="popcard-name" class="text-lg font-bold tracking-wider text-white">--</h3>
            <span id="popcard-angle" class="text-[10px] font-mono text-white/40 ml-auto">315°</span>
        </div>
        <div class="flex items-center gap-3 text-[10px] font-mono text-white/35 mb-2.5">
            <span>黄经 <b id="popcard-lng" class="text-white/60">--</b>°</span>
            <span>日照 <b id="popcard-daylight" class="text-white/60">--</b></span>
        </div>
        <p id="popcard-desc" class="text-[11px] leading-relaxed text-white/75 font-sans tracking-wide text-justify"></p>
        <div class="absolute -bottom-2 left-1/2 -translate-x-1/2 w-3 h-3 bg-black/70 border-r border-b border-white/15 rotate-45"></div>
    </div>

    <!-- ===== 赛博微型导航栏（仅手机端） ===== -->
    <div id="mobile-nav" class="fixed bottom-0 left-0 right-0 h-14 bg-black/80 border-t border-white/10 backdrop-blur-lg flex md:hidden z-50">
        <button id="tab-wheel" onclick="switchViewport('wheel')" class="flex-1 flex items-center justify-center gap-1.5 text-[11px] font-mono tracking-widest transition-all duration-300 border-b-2 border-transparent text-white/50">
            <span>岁时星盘</span>
            <span class="text-[9px] opacity-40">AXIS</span>
        </button>
        <button id="tab-calendar" onclick="switchViewport('calendar')" class="flex-1 flex items-center justify-center gap-1.5 text-[11px] font-mono tracking-widest transition-all duration-300 border-b-2 border-transparent text-white/50">
            <span>今日撕历</span>
            <span class="text-[9px] opacity-40">CALENDAR</span>
        </button>
    </div>

    <!-- 底部控制条 -->
    <div class="absolute bottom-16 md:bottom-6 left-1/2 -translate-x-1/2 flex items-center space-x-5 bg-black/60 border border-white/10 px-5 py-2 rounded-full backdrop-blur-md z-30 shadow-2xl">
        <button onclick="navigateTerm(-1)" class="hover:text-white text-white/30 cursor-pointer text-xs font-mono font-bold transition-colors">&lt;</button>
        <span id="countdown-timer" class="text-[10px] font-mono tracking-widest text-white/60 min-w-[200px] text-center uppercase">System Syncing...</span>
        <button onclick="navigateTerm(1)" class="hover:text-white text-white/30 cursor-pointer text-xs font-mono font-bold transition-colors">&gt;</button>
        <span class="text-white/15">|</span>
        <button id="reset-btn" onclick="resetToToday()" class="hover:text-white text-white/30 cursor-pointer text-[9px] font-mono font-bold transition-colors tracking-widest uppercase whitespace-nowrap">Reset Now</button>
    </div>

    <script src="data.js"></script>
    <script>
        // ======================== 全局状态 ========================
        let currentIndex = 0;
        let todayTermIndex = 0;
        let currentRotation = 0;
        const radius = 240;
        let canvas, ctx, particles = [];
        let mouseX = 0, mouseY = 0;
        let weatherData = null;
        let popupActive = false;
        let meritCount = 0;

        // ======================== 双视窗切换 ========================
        function switchViewport(target) {
            const wheel = document.getElementById('viewport-wheel');
            const panel = document.getElementById('detail-panel');
            const tabWheel = document.getElementById('tab-wheel');
            const tabCalendar = document.getElementById('tab-calendar');
            const activeTerm = solarTerms[todayTermIndex];

            if (target === 'wheel') {
                wheel.classList.remove('hidden');
                panel.classList.add('hidden');
                tabWheel.style.color = activeTerm.color;
                tabWheel.style.borderBottomColor = activeTerm.color;
                tabCalendar.style.color = '';
                tabCalendar.style.borderBottomColor = 'transparent';
            } else {
                wheel.classList.add('hidden');
                panel.classList.remove('hidden');
                tabCalendar.style.color = activeTerm.color;
                tabCalendar.style.borderBottomColor = activeTerm.color;
                tabWheel.style.color = '';
                tabWheel.style.borderBottomColor = 'transparent';
            }
        }

        // ======================== 工具函数 ========================
        function dateHash(str) {
            let h = 0;
            for (let i = 0; i < str.length; i++) { h = ((h << 5) - h) + str.charCodeAt(i); h |= 0; }
            return Math.abs(h);
        }

        function dailyPickDeduped(arr, count, seedStr) {
            const seed = dateHash(seedStr);
            const n = arr.length;
            const used = new Set();
            const result = [];
            let offset = 0;
            while (result.length < count && result.length < n) {
                const idx = (seed + offset * 7 + offset * offset) % n;
                if (!used.has(idx)) { used.add(idx); result.push(arr[idx]); }
                offset++;
            }
            return result;
        }

        function getTodayStr() {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        }

        function getSeason(termId) {
            if (termId >= 1 && termId <= 6) return 'spring';
            if (termId >= 7 && termId <= 12) return 'summer';
            if (termId >= 13 && termId <= 18) return 'autumn';
            return 'winter';
        }

        function getSeasonTotem(termId) {
            const s = getSeason(termId);
            if (s === 'spring') return { en: 'MUGUET', cn: '柔木青桃', icon: '🌱', char: '桃' };
            if (s === 'summer') return { en: 'LOTUS', cn: '盛夏碧荷', icon: '🪷', char: '荷' };
            if (s === 'autumn') return { en: 'ACER', cn: '暮秋霜枫', icon: '🍁', char: '枫' };
            return { en: 'PLUM', cn: '傲雪寒梅', icon: '❄️', char: '梅' };
        }

        function findTodayTermIndex() {
            const now = new Date();
            const month = now.getMonth() + 1;
            const day = now.getDate();
            const termDates = [
                {id:23,m:1,d:5},{id:24,m:1,d:20},{id:1,m:2,d:4},{id:2,m:2,d:19},
                {id:3,m:3,d:5},{id:4,m:3,d:20},{id:5,m:4,d:4},{id:6,m:4,d:20},
                {id:7,m:5,d:5},{id:8,m:5,d:21},{id:9,m:6,d:5},{id:10,m:6,d:21},
                {id:11,m:7,d:7},{id:12,m:7,d:22},{id:13,m:8,d:7},{id:14,m:8,d:23},
                {id:15,m:9,d:7},{id:16,m:9,d:23},{id:17,m:10,d:8},{id:18,m:10,d:23},
                {id:19,m:11,d:7},{id:20,m:11,d:22},{id:21,m:12,d:7},{id:22,m:12,d:21}
            ];
            let matchedId = 22;
            for (let i = 0; i < termDates.length; i++) {
                if (month < termDates[i].m || (month === termDates[i].m && day < termDates[i].d)) {
                    matchedId = i === 0 ? termDates[termDates.length-1].id : termDates[i-1].id;
                    break;
                }
                if (month === 12 && day >= 21) matchedId = 22;
            }
            const idx = solarTerms.findIndex(t => t.id === matchedId);
            return idx >= 0 ? idx : 0;
        }

        // ======================== 页面初始化 ========================
        document.addEventListener('DOMContentLoaded', () => {
            initCalendar();
            renderWheelNodes();
            initCanvas();
            fetchWeather();

            todayTermIndex = findTodayTermIndex();
            updateTodayPanel();
            renderMonthlyCalendar();
            renderStreakMatrix();
            checkCheckinStatus();
            meritCount = parseInt(localStorage.getItem('cyber_merit_count') || '0', 10);

            jumpToTerm(todayTermIndex);

            // 手机端默认激活星盘 Tab
            switchViewport('wheel');

            window.addEventListener('mousemove', (e) => { mouseX = e.clientX; mouseY = e.clientY; });
            window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });

            window.addEventListener('wheel', (e) => {
                if (e.target.closest('#detail-panel')) return;
                if (e.deltaY > 0) navigateTerm(1);
                else navigateTerm(-1);
            }, { passive: true });

            document.addEventListener('click', (e) => {
                if (!e.target.closest('.term-node') && !e.target.closest('#term-popcard') && !e.target.closest('#viewport-wheel button')) {
                    hideTermPopcard();
                }
            });

            document.getElementById('daily-checkin-btn').addEventListener('click', executeDailyCheckin);
            document.getElementById('reset-btn').addEventListener('click', resetToToday);
            setInterval(updateCountdown, 1000);
        });

        // ======================== 日历与日期 ========================
        function initCalendar() {
            const now = new Date();
            const months = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
            const weeks = ["SUN","MON","TUE","WED","THU","FRI","SAT"];
            document.getElementById('cal-month').innerText = months[now.getMonth()];
            document.getElementById('cal-day').innerText = now.getDate();
            document.getElementById('cal-week').innerText = weeks[now.getDay()];
            document.getElementById('month-label').innerText = `${months[now.getMonth()]} ${now.getFullYear()}`;
        }

        function renderMonthlyCalendar() {
            const grid = document.getElementById('monthly-calendar');
            grid.innerHTML = '';
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth();
            const today = now.getDate();
            const firstDay = new Date(year, month, 1).getDay();
            const totalDays = new Date(year, month + 1, 0).getDate();
            const todayTerm = solarTerms[todayTermIndex];
            const todayColor = todayTerm.color;

            for (let i = 0; i < firstDay; i++) {
                const empty = document.createElement('div');
                empty.className = 'h-[22px] rounded-sm';
                grid.appendChild(empty);
            }
            for (let d = 1; d <= totalDays; d++) {
                const cell = document.createElement('div');
                const isToday = d === today;
                cell.className = `h-[22px] rounded-sm flex items-center justify-center text-[10px] font-mono transition-all ${
                    isToday ? 'font-bold scale-110' : 'text-white/25'
                }`;
                cell.innerText = d;
                if (isToday) {
                    cell.style.backgroundColor = todayColor;
                    cell.style.color = '#0a0a0a';
                    cell.style.boxShadow = `0 0 10px ${todayColor}80`;
                }
                grid.appendChild(cell);
            }
        }

        // ======================== 天气 ========================
        const weatherMap = {
            'Clear': '晴', 'Sunny': '晴', 'Partly cloudy': '多云', 'Cloudy': '阴',
            'Overcast': '阴', 'Mist': '雾', 'Fog': '雾', 'Haze': '霾',
            'Rain': '雨', 'Light rain': '小雨', 'Patchy rain nearby': '阵雨',
            'Moderate rain': '中雨', 'Heavy rain': '大雨', 'Snow': '雪',
            'Light snow': '小雪', 'Moderate snow': '中雪', 'Heavy snow': '大雪',
            'Thunder': '雷', 'Drizzle': '毛毛雨', 'Freezing rain': '冻雨'
        };

        const cityMap = {
            'Shek Pai Wan': '香港', 'Hong Kong': '香港', 'Kowloon': '香港',
            'Shanghai': '上海', 'Beijing': '北京', 'Guangzhou': '广州',
            'Shenzhen': '深圳', 'Hangzhou': '杭州', 'Chengdu': '成都',
            'Nanjing': '南京', 'Wuhan': '武汉', 'Chongqing': '重庆',
            'Taipei': '台北', 'Tokyo': '东京', 'Seoul': '首尔',
            'Singapore': '新加坡', 'Bangkok': '曼谷', 'London': '伦敦',
            'New York': '纽约', 'Los Angeles': '洛杉矶', 'Paris': '巴黎'
        };

        function sanitizeCity(raw) {
            for (const [key, val] of Object.entries(cityMap)) {
                if (raw.includes(key)) return val;
            }
            if (raw.length > 10) return '当前位置';
            return raw;
        }

        async function fetchWeather() {
            const txtEl = document.getElementById('weather-text');
            try {
                const resp = await fetch('https://wttr.in/?format=j1');
                if (!resp.ok) throw new Error('HTTP ' + resp.status);
                const data = await resp.json();
                const rawCity = data.nearest_area[0].areaName[0].value;
                const city = sanitizeCity(rawCity);
                const cond = data.current_condition[0];
                const rawWeather = cond.weatherDesc[0].value;
                const temp = cond.temp_C;
                const weather = weatherMap[rawWeather] || rawWeather.split(' ').slice(0, 2).join(' ');
                weatherData = { city, weather, temp, raw: rawWeather };
                txtEl.innerText = `${city} · ${weather} · ${temp}℃`;
                updateWeatherVisual();
            } catch (e) {
                console.warn('天气接口不可达:', e.message);
                txtEl.innerText = 'Chrono Syncing · 岁时流转';
                weatherData = { city: '--', weather: '--', temp: '--', raw: 'Clear' };
                updateWeatherVisual();
            }
        }

        function getWeatherVisualType(raw) {
            const r = (raw || '').toLowerCase();
            if (r.includes('snow') || r.includes('blizzard') || r.includes('ice')) return 'snow';
            if (r.includes('thunder') || r.includes('lightning')) return 'thunder';
            if (r.includes('rain') || r.includes('drizzle') || r.includes('shower')) return 'rain';
            if (r.includes('fog') || r.includes('mist') || r.includes('haze')) return 'fog';
            if (r.includes('overcast')) return 'overcast';
            if (r.includes('cloud') || r.includes('partly')) return 'cloudy';
            return 'clear';
        }

        function updateWeatherVisual() {
            if (!weatherData) return;
            const type = getWeatherVisualType(weatherData.raw);
            const hub = document.getElementById('center-hub');
            if (hub) hub.dataset.weather = type;
            updateWeatherBadge(weatherData.weather, weatherData.temp);
            // 天气数据到达后立即刷新粒子
            if (particles && particles.length > 0) {
                for (let i = 0; i < particles.length; i++) {
                    particles[i] = createWeatherParticle(true);
                }
            }
        }

        function updateWeatherBadge(weather, temp) {
            const badge = document.getElementById('weather-badge');
            if (!badge) return;
            const type = weatherData ? getWeatherVisualType(weatherData.raw) : 'clear';
            const icons = { clear: '☀️', cloudy: '⛅', overcast: '☁️', rain: '🌧️', snow: '❄️', fog: '🌫️', thunder: '⛈️' };
            badge.innerHTML = `${icons[type] || '🌐'} ${weather} · ${temp}℃`;
        }

        function renderWheelNodes() {
            const container = document.getElementById('wheel-container');
            container.innerHTML = '';
            solarTerms.forEach((term, index) => {
                const btn = document.createElement('button');
                btn.className = `absolute text-xs tracking-widest text-white/20 hover:text-white font-sans cursor-pointer transition-all duration-300 term-node node-${index}`;
                btn.innerText = term.name;
                btn.style.transformOrigin = 'center center';
                const rad = (term.angle - 90) * Math.PI / 180;
                btn.style.left = `${radius * Math.cos(rad) + radius + 40}px`;
                btn.style.top = `${radius * Math.sin(rad) + radius + 100}px`;
                btn.onclick = (e) => {
                    e.stopPropagation();

                    showTermPopcard(term, btn);
                };
                container.appendChild(btn);

        // ======================== 星盘旋转 ========================
        function jumpToTerm(index) {
            currentIndex = (index + 24) % 24;
            const term = solarTerms[currentIndex];
            const targetRotation = 270 - term.angle;
            let diff = (targetRotation - currentRotation) % 360;
            if (diff > 180) diff -= 360;
            if (diff < -180) diff += 360;
            currentRotation += diff;

            gsap.to('#wheel-container', {
                rotation: currentRotation,
                duration: 0.8,
                ease: 'power3.out',
                onUpdate: () => {
                    solarTerms.forEach((_, idx) => {
                        gsap.set(`.node-${idx}`, { rotation: -window.gsap.getProperty('#wheel-container', 'rotation') });
                    });
                }
            });

            solarTerms.forEach((_, idx) => {
                const el = document.querySelector(`.node-${idx}`);
                if (!el) return;
                if (idx === currentIndex) {
                    el.className = `absolute text-xs tracking-widest font-sans cursor-pointer transition-all duration-300 term-node node-${idx} text-white text-glow scale-125 font-bold`;
                } else {
                    el.className = `absolute text-xs tracking-widest font-sans cursor-pointer transition-all duration-300 term-node node-${idx} text-white/20`;
                }
            });

            updateCenterHub(term);
            updateAmbientGlow(term);
            if (popupActive) {
                updatePopcardContent(term);
                positionPopcardNearHub();
            }
        }

        function navigateTerm(direction) {
            jumpToTerm(currentIndex + direction);
            const term = solarTerms[currentIndex];
            showTermPopcard(term, document.getElementById('center-hub'));
        }

        // ======================== 倒计时 ========================
        function updateCountdown() {
            const now = new Date();
            const nextTransition = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 3, 23, 59, 59);
            const diff = nextTransition - now;
            if (diff <= 0) { document.getElementById('countdown-timer').innerText = 'CHRONO INTERSECTION / 气象交接中'; return; }
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const secs = Math.floor((diff % (1000 * 60)) / 1000);
            document.getElementById('countdown-timer').innerText = `${days}D ${hours}H ${mins}M ${secs}S TO NEXT TERM`;
        }

        // ======================== Canvas 粒子引擎 (天气驱动) ========================
        function initCanvas() {
            canvas = document.getElementById('ambient-canvas');
            ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for (let i = 0; i < 80; i++) { particles.push(createWeatherParticle(true)); }
            animateParticles();
        }

        function createWeatherParticle(randomY) {
            const type = weatherData ? getWeatherVisualType(weatherData.raw) : 'clear';
            const p = {
                x: Math.random() * (canvas.width || window.innerWidth),
                y: randomY ? Math.random() * (canvas.height || window.innerHeight) : -20,
                vx: 0, vy: 0,
                size: 1,
                alpha: Math.random() * 0.4 + 0.1,
                wobble: Math.random() * Math.PI * 2,
                wobbleSpeed: 0,
                shape: 'circle',
                life: 1,
                decay: 0,
            };

            switch (type) {
                case 'clear':
                    p.size = Math.random() * 2.2 + 1;
                    p.vy = -(Math.random() * 0.5 + 0.15);
                    p.vx = (Math.random() - 0.5) * 0.3;
                    p.alpha = Math.random() * 0.55 + 0.2;
                    p.shape = Math.random() > 0.85 ? 'glow' : 'circle';
                    if (p.shape === 'glow') p.size = Math.random() * 5 + 3;
                    break;
                case 'cloudy':
                    p.size = Math.random() * 7 + 3;
                    p.vx = (Math.random() - 0.5) * 0.25;
                    p.vy = (Math.random() - 0.5) * 0.1;
                    p.alpha = Math.random() * 0.18 + 0.05;
                    p.shape = 'blob';
                    break;
                case 'overcast':
                    p.size = Math.random() * 9 + 5;
                    p.vx = (Math.random() - 0.5) * 0.2;
                    p.vy = (Math.random() - 0.5) * 0.07;
                    p.alpha = Math.random() * 0.14 + 0.04;
                    p.shape = 'blob';
                    break;
                case 'rain':
                    p.size = Math.random() * 2 + 1;
                    p.vy = Math.random() * 4 + 3;
                    p.vx = -0.5 - Math.random() * 0.8;
                    p.alpha = Math.random() * 0.45 + 0.2;
                    p.shape = 'streak';
                    p.decay = 0.002 + Math.random() * 0.004;
                    p.y = randomY ? Math.random() * canvas.height : -(Math.random() * 200);
                    break;
                case 'snow':
                    p.size = Math.random() * 3.5 + 2;
                    p.vy = Math.random() * 0.7 + 0.3;
                    p.vx = (Math.random() - 0.5) * 0.9;
                    p.wobbleSpeed = Math.random() * 0.025 + 0.01;
                    p.alpha = Math.random() * 0.6 + 0.2;
                    p.shape = 'flake';
                    break;
                case 'fog':
                    p.size = Math.random() * 16 + 8;
                    p.vx = (Math.random() - 0.5) * 0.12;
                    p.vy = (Math.random() - 0.5) * 0.05;
                    p.alpha = Math.random() * 0.07 + 0.02;
                    p.shape = 'blob';
                    break;
                case 'thunder':
                    p.size = Math.random() * 2 + 1.2;
                    p.vx = (Math.random() - 0.5) * 0.6;
                    p.vy = (Math.random() - 0.5) * 0.6;
                    p.alpha = Math.random() * 0.4 + 0.1;
                    p.shape = Math.random() > 0.88 ? 'flash' : 'circle';
                    break;
                default:
                    p.size = Math.random() * 2 + 1;
                    p.vx = (Math.random() - 0.5) * 0.3;
                    p.vy = (Math.random() - 0.5) * 0.3;
            }
            return p;
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const type = weatherData ? getWeatherVisualType(weatherData.raw) : 'clear';

            // 雷电：间歇性全屏闪光
            if (type === 'thunder' && Math.random() < 0.004) {
                ctx.fillStyle = `rgba(255,255,255,${0.06 + Math.random() * 0.08})`;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            particles.forEach((p, idx) => {
                // 鼠标斥力
                const dx = mouseX - p.x;
                const dy = mouseY - p.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 140) {
                    const force = (140 - dist) / 140;
                    p.x -= (dx / dist) * force * 2;
                    p.y -= (dy / dist) * force * 2;
                }

                // 雪花左右飘摇
                if (p.shape === 'flake') {
                    p.wobble += p.wobbleSpeed;
                    p.x += Math.sin(p.wobble) * 0.35;
                }

                p.x += p.vx;
                p.y += p.vy;

                // 雨的渐隐生命周期
                if (p.decay > 0) {
                    p.life -= p.decay;
                    if (p.life <= 0) {
                        particles[idx] = createWeatherParticle(false);
                        particles[idx].y = -(Math.random() * 150);
                        particles[idx].x = Math.random() * (canvas.width + 300) - 150;
                        return;
                    }
                }

                // 边界循环
                if (p.y < -40) { p.y = canvas.height + 30; p.x = Math.random() * canvas.width; }
                if (p.y > canvas.height + 40) { p.y = -30; p.x = Math.random() * canvas.width; }
                if (p.x < -40) p.x = canvas.width + 30;
                if (p.x > canvas.width + 40) p.x = -30;

                ctx.beginPath();

                switch (p.shape) {
                    case 'streak': {
                        // 雨丝：细长斜线
                        const len = p.size * 6;
                        ctx.strokeStyle = `rgba(140,190,235,${p.alpha * p.life})`;
                        ctx.lineWidth = p.size * 0.28;
                        ctx.lineCap = 'round';
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(p.x - p.vx * 3, p.y - len);
                        ctx.stroke();
                        break;
                    }
                    case 'blob': {
                        // 云/雾：大块柔光团
                        const grd = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size);
                        const a = p.alpha * 1.6;
                        if (type === 'fog') {
                            grd.addColorStop(0, `rgba(185,185,185,${a})`);
                            grd.addColorStop(1, 'rgba(185,185,185,0)');
                        } else if (type === 'overcast') {
                            grd.addColorStop(0, `rgba(145,145,150,${a})`);
                            grd.addColorStop(1, 'rgba(145,145,150,0)');
                        } else {
                            grd.addColorStop(0, `rgba(225,220,215,${a})`);
                            grd.addColorStop(1, 'rgba(225,220,215,0)');
                        }
                        ctx.fillStyle = grd;
                        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                        ctx.fill();
                        break;
                    }
                    case 'glow': {
                        // 晴天光晕
                        const glow = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size);
                        glow.addColorStop(0, `rgba(255,225,160,${p.alpha})`);
                        glow.addColorStop(0.5, `rgba(255,185,80,${p.alpha * 0.5})`);
                        glow.addColorStop(1, 'rgba(255,150,50,0)');
                        ctx.fillStyle = glow;
                        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                        ctx.fill();
                        break;
                    }
                    case 'flake': {
                        // 雪花：柔白圆点带光晕
                        const fg = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size);
                        fg.addColorStop(0, `rgba(255,255,255,${p.alpha})`);
                        fg.addColorStop(0.6, `rgba(255,255,255,${p.alpha * 0.4})`);
                        fg.addColorStop(1, 'rgba(255,255,255,0)');
                        ctx.fillStyle = fg;
                        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                        ctx.fill();
                        break;
                    }
                    case 'flash': {
                        // 雷电粒子：亮白闪烁
                        ctx.fillStyle = `rgba(255,250,225,${p.alpha * 1.8})`;
                        ctx.shadowColor = 'rgba(255,250,200,0.6)';
                        ctx.shadowBlur = p.size * 3;
                        ctx.arc(p.x, p.y, p.size * 0.8, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.shadowBlur = 0;
                        break;
                    }
                    default: {
                        const clr = type === 'clear' ? `rgba(255,220,140,${p.alpha})` : `rgba(220,220,230,${p.alpha})`;
                        ctx.fillStyle = clr;
                        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            });

            if (particles.length < 80) particles.push(createWeatherParticle(true));
            if (particles.length > 90) particles.length = 80;

            requestAnimationFrame(animateParticles);
        }
    </script>
</body>
</html>
